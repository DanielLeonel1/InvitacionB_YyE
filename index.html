  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const btnIcon = document.getElementById('iconAudio');
      let audioIniciado = false;

      const sound = new Howl({
        src: ['musica/Lim Kim - Confess To You.mp3'],
        loop: true,
        volume: 0.7,
        html5: true 
      });

      // 🎧 Detectar estado REAL del audio
      sound.on('play', function () {
        console.log("PLAY detectado");
        btnIcon.src = "./img/icons/pause-circle.svg";
      });

      sound.on('pause', function () {
        console.log("PAUSE detectado");
        btnIcon.src = "./img/icons/play-circle.svg";
      });

      function iniciarAudio() {
        if (!audioIniciado) {
          sound.play();
          audioIniciado = true;
        }
      }

      window.toggleAudio = function() {
        if (sound.playing()) {
          sound.pause();
        } else {
          sound.play();
        }
      }

      window.addEventListener('scroll', iniciarAudio, { once: true });
      window.addEventListener('click', iniciarAudio, { once: true });
      window.addEventListener('touchstart', iniciarAudio, { once: true });

    });
  </script>
